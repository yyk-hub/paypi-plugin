# .github/workflows/cleanup-idempotency.yml
name: Cleanup Idempotency Keys

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Expired Idempotency Keys
        run: |
          curl -X POST https://paypi-plugin.pages.dev/api/admin/cleanup-idempotency \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}"
        
      - name: Log Result
        run: echo "Idempotency cleanup completed"

# Setup:
# 1. Go to GitHub repo → Settings → Secrets
# 2. Add secret: ADMIN_TOKEN (same as your Cloudflare Pages secret)
# 3. This workflow will run automatically every day at midnight UTC